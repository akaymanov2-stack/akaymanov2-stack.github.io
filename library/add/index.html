<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Загрузка книги — Библиотека</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="theme-color" content="#0b0c10">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Unbounded:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="bg-glow"></div>

<nav>
  <div class="wrap nav-in">
    <a class="logo" href="/#top">АНДРЕЙ<span>&nbsp;КАЙМАНОВ</span></a>
    <div class="nav-links">
      <a href="/library/">← В библиотеку</a>
    </div>
    <button class="nav-cta" id="logoutBtn" hidden>Выйти</button>
  </div>
</nav>

<main class="wrap" style="max-width:640px;padding:48px 0 80px">

  <!-- Вход -->
  <section id="loginBox" class="upload-box" hidden>
    <h1>Вход</h1>
    <p class="sec-sub">Загружать книги может только владелец сайта.</p>
    <form id="loginForm" class="upload-form">
      <label>Email<input type="email" id="email" required autocomplete="username"></label>
      <label>Пароль<input type="password" id="password" required autocomplete="current-password"></label>
      <button class="btn-main" type="submit">Войти</button>
      <p class="upload-msg" id="loginMsg"></p>
    </form>
  </section>

  <!-- Форма загрузки -->
  <section id="uploadBox" class="upload-box" hidden>
    <h1>Добавить книгу</h1>
    <p class="sec-sub">PDF и обложка загрузятся в хранилище, книга появится в библиотеке.</p>
    <form id="bookForm" class="upload-form">
      <label>Название *<input type="text" id="title" required></label>
      <label>Автор<input type="text" id="author"></label>
      <label>Год<input type="number" id="bookYear" min="0" max="2100"></label>
      <label>Описание<textarea id="description" rows="3"></textarea></label>
      <label>Теги (через запятую)<input type="text" id="tags" placeholder="маркетинг, аналитика"></label>
      <label>Обложка (изображение, необязательно)<input type="file" id="cover" accept="image/*"></label>
      <label>Файл книги (PDF) *<input type="file" id="pdf" accept="application/pdf" required></label>
      <button class="btn-main" type="submit" id="submitBtn">Загрузить книгу</button>
      <p class="upload-msg" id="uploadMsg"></p>
    </form>
  </section>

  <p id="bootMsg" class="sec-sub">Загрузка…</p>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/config.js"></script>
<script src="/upload.js"></script>
</body>
</html>
