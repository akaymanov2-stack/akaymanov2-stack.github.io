---
layout: default
---
<main class="wrap post-wrap">
  <a class="case-back" href="/blog/">← Все статьи</a>
  <article class="post">
    <header class="post-head">
      {% if page.tag %}<span class="tag">{{ page.tag }}</span>{% endif %}
      <h1>{{ page.title }}</h1>
      <div class="post-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%-d %B %Y" }}</time>
        <span>·</span>
        <span>Андрей Кайманов</span>
      </div>
    </header>
    {% if page.image and page.image != '/og.png' %}
    <figure class="post-cover"><img src="{{ page.image }}" alt="{{ page.title | escape }}"></figure>
    {% endif %}
    <div class="post-body">
      {{ content }}
    </div>
    <div class="post-cta">
      <p>Нужен performance-маркетинг под рост продаж?</p>
      <a class="btn-main" href="/#contact">Обсудить задачу →</a>
    </div>
  </article>
</main>
